# Zap release pipeline — triggered by pushing tag (v*) to the openWarp branch
#
# Differences from upstream create_release.yml:
# - Only macOS arm64 + macOS Intel + Windows x64 + Linux x86_64,
#   all of Web/CLI/Universal/Win-arm64 removed
#   (macOS dual-architecture produces single-arch DMG and CLI tarball respectively; Linux produces AppImage/deb/rpm
#    plus best-effort Arch package, does not publish upstream Zap repository source or signing keys)
# - Single channel: preview (configuration provided by release_configurations.json)
# - No signing: no --read-passwords-from-env (macOS) / no SIGN_TOOL_CMD (Windows)
# - No upload to GCS / third-party crash platforms / Slack / changelog, no channel-versions repository_dispatch call
# - Reuse ./.github/actions/{prepare_environment,get_channel_config}
#
# Pipeline structure (package first, publish later, avoid creating empty Release):
#   prepare_metadata → release_{macos,windows,linux} (upload as workflow artifact)
#                    → publish_release (download artifact and create Release after all builds succeed)
# If any build job fails → publish_release skips due to needs → no Release without installers left behind.

name: Zap Release

# PR validation is handled by .github/workflows/pr-check.yml (Linux cargo check).
# This workflow only runs full three-platform packaging when pushing a tag / manual dispatch, avoiding ~3h waste on PRs.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Creating a release + uploading assets requires write permissions. Default GITHUB_TOKEN is read-only on forks/restricted repos,
# explicitly declare contents: write here to avoid 403 "Resource not accessible by integration".
# actions: write is used by publish_release at the end to delete this run's workflow artifacts (free up Actions storage).
permissions:
  contents: write
  actions: write

env:
  CARGO_TERM_COLOR: always
  CONFIG_FILE: ".github/workflows/release_configurations.json"
  # Zap fork uses oss channel (corresponding to inline ChannelConfig in app/src/bin/oss.rs,
  # does not depend on private warp-channel-config binary), internal channels like preview use
  # channel_config::load_config!() macro → build.rs calls warp-channel-config fails →
  # *_config.json not generated → include_str! compilation fails.
  CHANNEL: oss

jobs:
  prepare_metadata:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.compute_tag.outputs.tag }}
      release_branch: ${{ steps.compute_tag.outputs.branch }}
      release_name: ${{ steps.get-config.outputs.release_base_name }} ${{ steps.compute_tag.outputs.tag }}
    steps:
      # fetch-depth: 0 lets git-cliff see the full tag/commit history;
      # under shallow clone, `git describe` cannot find the previous tag, degrades to empty release notes.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get channel configuration
        id: get-config
        uses: ./.github/actions/get_channel_config/
        with:
          config_file: ${{ env.CONFIG_FILE }}
          channel: ${{ env.CHANNEL }}

      - name: Compute release tag and branch
        id: compute_tag
        shell: bash
        run: |
          # tag-triggered scenario: GITHUB_REF=refs/tags/<tag>
          # workflow_dispatch: GITHUB_REF=refs/heads/<branch>, no tag, generate temporary tag
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            BRANCH="$TAG"
          else
            TAG="v0.$(date +%Y.%m.%d.%H%M)"
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG / build ref: $BRANCH"

      # Find the previous release tag (matching v*) to limit the commit range for git-cliff.
      # tag-triggered: HEAD == current tag, find the nearest v* tag starting from HEAD^.
      # dispatch: HEAD is not a tag, find directly from HEAD.
      # If not found (first release), output empty string, git-cliff won't limit the range afterward.
      - name: Compute previous release tag
        id: prev_tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            PREV=$(git describe --tags --abbrev=0 --match='v*' HEAD^ 2>/dev/null || echo "")
          else
            PREV=$(git describe --tags --abbrev=0 --match='v*' HEAD 2>/dev/null || echo "")
          fi
          echo "prev=$PREV" >> $GITHUB_OUTPUT
          echo "Previous tag: ${PREV:-<none, first release>}"

      # Use the officially recommended orhun/git-cliff-action to generate change notes from the previous tag to HEAD.
      # --strip header removes the empty header at the top of the template; --tag marks the unreleased section as this release version.
      # Range parameter `<prev>..HEAD` is injected via a ternary expression: limit range when prev exists, output full history when absent (first release scenario).
      - name: Generate release notes via git-cliff
        uses: orhun/git-cliff-action@98c93442bb05a455a77bee982867857ae748eeea # v4.5.1
        with:
          config: cliff.toml
          args: >-
            --strip header
            --tag ${{ steps.compute_tag.outputs.tag }}
            ${{ steps.prev_tag.outputs.prev != '' && format('{0}..HEAD', steps.prev_tag.outputs.prev) || '' }}
        env:
          OUTPUT: release-notes.md
          GITHUB_REPO: ${{ github.repository }}

      # Prepend a fixed description from release_configurations.json before git-cliff output,
      # forming the final release body. Subsequent publish_release injects it into GitHub Release via body_path.
      - name: Assemble final release body
        shell: bash
        env:
          RELEASE_BODY_TEXT: ${{ steps.get-config.outputs.release_body_text }}
          PREV_TAG: ${{ steps.prev_tag.outputs.prev }}
          THIS_TAG: ${{ steps.compute_tag.outputs.tag }}
        run: |
          {
            echo "$RELEASE_BODY_TEXT"
            echo
            if [[ -n "$PREV_TAG" ]]; then
              echo "## Updates since \`$PREV_TAG\`"
            else
              echo "## First release changes"
            fi
            echo
            cat release-notes.md
          } > release-body.md
          echo "---- release-body.md ----"
          cat release-body.md

      - name: Upload release body artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-body
          path: release-body.md
          if-no-files-found: error
          retention-days: 7

  release_macos:
    name: Build Release (macOS ${{ matrix.dmg_name_suffix }})
    runs-on: ${{ matrix.runner }}
    needs: prepare_metadata
    # macos-26 / macos-26-intel (Pro standard) has no sccache, full cargo build + bundle + create-dmg
    # is time-consuming; Intel builds historically exceed 180min, relaxing here to GitHub-hosted job 6h limit.
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            dmg_name_suffix: arm64
            runner: macos-26 # Pro standard arm64 (M2 Pro)
          - arch: x86_64
            dmg_name_suffix: intel
            runner: macos-26-intel # Pro standard Intel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare_metadata.outputs.release_branch }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          cache_key: macos-${{ matrix.arch }}
          is_self_hosted: false
          install_release_deps: true

      - name: Ensure rust target is installed
        run: rustup target add ${{ matrix.arch }}-apple-darwin
        shell: bash

      - name: Check ${{ matrix.arch }} release compile
        run: |
          script/bundle --check-only --channel "$CHANNEL" --arch ${{ matrix.arch }} --dmg-name-suffix "${{ matrix.dmg_name_suffix }}" --selfsign
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ needs.prepare_metadata.outputs.release_tag }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Install cargo-bundle
        run: script/install_cargo_bundle

      - name: Install create-dmg
        run: brew install create-dmg

      # Use --selfsign for ad-hoc signing (fallback to `-` when no Apple Developer cert):
      # 1. Give .app a cdhash → UNUserNotificationCenter registers Zap to
      #    System Settings → Notifications (otherwise desktop notifications silently fail, see issue #40).
      # 2. ad-hoc + Hardened Runtime + Debug-Entitlements.plist (disable-library-validation
      #    + get-task-allow) is a valid combination, can be completed on macos-26 runner without credentials.
      # 3. The entire notarize block is skipped by the CODESIGN=false branch in `script/macos/bundle`; DMG is created directly
      #    from BUNDLE_DIR with create-dmg, no codesign / staple steps.
      # 4. Users still see Gatekeeper's "unidentified developer" dialog on first open (inherent limitation of lacking Developer ID
      #    notarize); the self-help solution `xattr -rd com.apple.quarantine` provided in issue #51 remains effective.
      - name: Build ${{ matrix.arch }} bundle (ad-hoc signed)
        id: bundle_app
        run: |
          script/bundle --channel "$CHANNEL" --arch ${{ matrix.arch }} --dmg-name-suffix "${{ matrix.dmg_name_suffix }}" --selfsign
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ needs.prepare_metadata.outputs.release_tag }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zap-macos-${{ matrix.dmg_name_suffix }}
          path: ${{ steps.bundle_app.outputs.dmg_path }}
          if-no-files-found: error
          retention-days: 7

      - name: Build CLI
        id: bundle_cli
        run: |
          script/bundle --channel "$CHANNEL" --arch ${{ matrix.arch }} --artifact cli --nosign
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ needs.prepare_metadata.outputs.release_tag }}

      - name: Package CLI tarball
        run: |
          cp "${{ steps.bundle_cli.outputs.binary_path }}" zap-oss
          tar czf zap-macos-${{ matrix.arch }}.tar.gz \
            zap-oss \
            -C "$(dirname "${{ steps.bundle_cli.outputs.bundled_resources_dir }}")" resources
        shell: bash

      - name: Upload CLI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zap-cli-macos-${{ matrix.arch }}
          path: zap-macos-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release_windows:
    name: Build Release (Windows x64)
    runs-on: windows-latest
    needs: prepare_metadata
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare_metadata.outputs.release_branch }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: windows
          cache_key: x64
          is_self_hosted: false
          install_release_deps: true

      - name: Build binary (unsigned)
        id: build_binary
        run: script/bundle -Channel $CHANNEL -skip_build_installer --arch x64
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ needs.prepare_metadata.outputs.release_tag }}

      - name: Bundle app (unsigned installer)
        id: bundle_app
        run: script/bundle -Channel $CHANNEL -skip_build_binary --arch x64
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ needs.prepare_metadata.outputs.release_tag }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zap-windows-x64
          path: ${{ steps.bundle_app.outputs.installer_path }}
          if-no-files-found: error
          retention-days: 7

  release_linux:
    name: Build Release (Linux x86_64)
    runs-on: ubuntu-22.04
    needs: prepare_metadata
    # Use 22.04 (glibc 2.35) instead of ubuntu-latest (24.04, glibc 2.39),
    # AppImage links against host glibc, 22.04 artifacts can run on more older distributions
    # (Debian 11 / Ubuntu 20.04 and others).
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare_metadata.outputs.release_branch }}

      # GitHub-hosted ubuntu runner's / free space is limited, and this job sequentially outputs
      # release-lto (GUI/AppImage/deb/rpm/arch) and release-cli (musl CLI) two complete
      # targets; combined with cargo registry / docker images / zig toolchain, it exhausts the disk, musl CLI
      # step reports "No space left on device" (see run 27593938453). First delete pre-installed
      # toolchains unrelated to this build (Android SDK / .NET / GHC / CodeQL / Swift), freeing ~25GB.
      - name: Free up disk space
        shell: bash
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/share/swift || true
          df -h /

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: false
          install_release_deps: true

      - name: Install extra dependencies for deb/rpm and build
        run: |
          sudo apt-get update
          # `rpm` package provides /usr/bin/rpmbuild, used by the RPM packaging step below.
          sudo apt-get install -y libdbus-1-dev fakeroot rpm
        shell: bash

      - name: Ensure rust target is installed
        run: rustup target add x86_64-unknown-linux-gnu
        shell: bash

      - name: Check Linux release compile
        run: script/bundle --check-only --channel "$CHANNEL" --arch x86_64 --packages appimage,deb
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ needs.prepare_metadata.outputs.release_tag }}

      - name: Install linuxdeploy
        # script/linux/install_linuxdeploy is not called by install_build_deps, needs to run manually;
        # it places linuxdeploy AppImage into ~/.local/bin, added to PATH.
        run: |
          ./script/linux/install_linuxdeploy
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        shell: bash

      - name: Build AppImage (unsigned)
        id: bundle_app
        run: script/bundle --channel "$CHANNEL" --arch x86_64 --packages appimage,deb
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ needs.prepare_metadata.outputs.release_tag }}
          # ubuntu-22.04 has libfuse2 by default but 24.04 doesn't; uniformly enable EXTRACT_AND_RUN
          # so linuxdeploy/appimagetool doesn't depend on FUSE kernel module, stable across runner versions.
          APPIMAGE_EXTRACT_AND_RUN: 1

      # RPM package: reuse the already-stripped `target/release-lto/zap-oss` from the previous release-lto step,
      # no need to `cargo build` again. `--skip-build` lets `script/bundle` skip compilation and stripping,
      # go directly to staging (`bundle_install` → copy binary + resources) + rpmbuild.
      # Run on the same ubuntu-22.04 runner as deb, sharing artifacts linked against host glibc;
      # install with RPM 4.13+ on Fedora 26+ / RHEL 8+ (spec uses boolean dep syntax).
      # continue-on-error: rpmbuild failure should not block AppImage/deb already successful release.
      - name: Build RPM package (reuse release-lto binary)
        continue-on-error: true
        run: script/bundle --skip-build --channel "$CHANNEL" --arch x86_64 --packages rpm
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ needs.prepare_metadata.outputs.release_tag }}

      # Arch package: reuse the already-stripped `target/release-lto/zap-oss` from the previous release-lto step,
      # no need to `cargo build` the main binary again — `--skip-build` lets `script/bundle` skip compilation and stripping,
      # go directly to staging (`bundle_install` → copy binary + resources) + makepkg.
      #
      # Why in a container: `makepkg` is Arch-specific, not available on Ubuntu runner.
      # Only install Arch's own `rust` and `cargo-about` in the container:
      #   - After SKIP_SETTINGS_SCHEMA=1, no longer run `cargo run --bin generate_settings_schema`,
      #     so it doesn't matter if rustc version in the container differs from the project's locked version (1.92.x).
      #   - `cargo about generate` only reads Cargo.lock metadata to generate third-party licenses,
      #     doesn't trigger any Rust code compilation.
      # makepkg refuses to run as root (EUID==0), must switch to a non-root user.
      # continue-on-error: Arch toolchain breakage doesn't affect AppImage/deb release.
      - name: Build Arch package (reuse release-lto binary)
        continue-on-error: true
        run: |
          set -euo pipefail
          # Create builder in the container using the host runner user's uid/gid, avoiding the cost of chowning the entire
          # /work and ~/.cargo (makepkg refuses root, but uid != 0 is sufficient,
          # any name and specific uid works).
          HOST_UID=$(id -u)
          HOST_GID=$(id -g)
          # Note: do not pass GITHUB_ACTIONS=true into the container.
          # script/bundle will `echo ... >> "$GITHUB_OUTPUT"` when it sees that variable,
          # but GITHUB_OUTPUT doesn't exist in the container, redirecting to an empty string triggers `set -e` exit,
          # Arch package won't build at all (see run 26153630745).
          # We also don't need this step's outputs — it continue-on-error,
          # packages_dir is provided by the bundle_app.outputs from the AppImage step above.
          docker run --rm \
            -v "$PWD:/work" \
            -v "$HOME/.cargo:/cargo-home" \
            -w /work \
            -e GIT_RELEASE_TAG="${{ needs.prepare_metadata.outputs.release_tag }}" \
            -e SKIP_SETTINGS_SCHEMA=1 \
            -e HOST_UID="$HOST_UID" \
            -e HOST_GID="$HOST_GID" \
            archlinux:latest bash -euxc '
              # Pre-install runtime dependencies from PKGBUILD `depends`, avoiding makepkg -s
              # calling `sudo pacman -S` inside the container to install missing packages (builder has no passwordless sudo,
              # exits with 8 due to not reading password, Arch package gets skipped, see run 26267606877).
              # `opengl-driver` doesn't exist in the official repo (NixOS concept / AUR virtual package),
              # use --assume-installed separately to skip it in dependency checks.
              pacman -Sy --noconfirm --needed \
                base-devel git sudo rust cargo-about \
                curl default-cursors fontconfig libegl libx11 libxcb \
                libxcursor libxi libxkbcommon-x11 xdg-utils zlib &&
              # Create user with host uid/gid, the mounted /work and /cargo-home owner is it,
              # no chown needed, can directly read/write via sudo -u.
              groupadd -g "$HOST_GID" builder 2>/dev/null || true
              useradd -u "$HOST_UID" -g "$HOST_GID" -m builder
              # Explicitly set HOME=/home/builder, otherwise `sudo -E` preserves outer HOME=/root,
              # causing `git config --global` to try writing /root/.gitconfig and report Permission denied.
              sudo -u builder -E env \
                HOME=/home/builder \
                CARGO_HOME=/cargo-home \
                PATH=/cargo-home/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin \
                bash -c "
                  git config --global --add safe.directory /work
                  cd /work
                  # Dependencies are already installed by pacman at the outer level; tell makepkg to treat `opengl-driver`
                  # as already installed, avoiding it running `pacman -S` for a package not in the repo.
                  # Also include --noconfirm: GITHUB_ACTIONS is not passed into the container,
                  # the native branch in bundle_arch won't take effect.
                  MAKEPKG_EXTRA_ARGS='\''--noconfirm --assume-installed opengl-driver'\'' \
                    script/bundle --skip-build --channel oss --arch x86_64 --packages arch
                "
            '
        shell: bash

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zap-linux-x86_64
          # packages_dir is target/release-lto/bundle/linux, AppImage/deb/Arch all end up here
          path: ${{ steps.bundle_app.outputs.packages_dir }}
          if-no-files-found: error
          retention-days: 7

      # release-lto artifacts (GUI/deb/rpm/arch) have already been uploaded by the previous "Upload package artifacts"
      # as workflow artifacts, no longer needed locally; the musl CLI below uses independent release-cli
      # profile, delete release-lto to free disk for it, avoiding "No space left on device".
      - name: Reclaim disk before musl CLI build
        shell: bash
        run: |
          rm -rf target/release-lto
          df -h /

      # CLI/remote-server tarball uses static musl linking, artifacts don't depend on host glibc,
      # can run on any Linux x86_64 host (including CentOS 7 / Amazon Linux 2 with older glibc
      # and Alpine and other musl distributions). GUI AppImage/deb still use the
      # glibc linking build above, unaffected.
      #
      # Use `cargo zigbuild` for musl cross-compilation: zig includes complete C/C++ musl
      # toolchain (`zig cc` / `zig c++`), doesn't depend on host's `musl-gcc` or hand-written
      # `musl-g++` wrapper — historically, the "host g++ + musl specs" hack prepared for *-sys
      # dependencies like freetype-sys / harfbuzz-sys is now completely removed.
      # Local dev auto-build paths (`ssh_transport.rs`) also prefer zigbuild, toolchain unified on both sides.
      - name: Install zig + cargo-zigbuild for static musl CLI build
        run: |
          set -euo pipefail
          rustup target add x86_64-unknown-linux-musl
          # zig: use official pre-compiled tarball, fixed version to ensure reproducible builds.
          # 0.13.0 is compatible with cargo-zigbuild >= 0.19.
          ZIG_VERSION="0.13.0"
          ZIG_DIR="$HOME/.local/zig-${ZIG_VERSION}"
          if [ ! -x "${ZIG_DIR}/zig" ]; then
            mkdir -p "${ZIG_DIR}"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" \
              | tar -xJ -C "${ZIG_DIR}" --strip-components=1
          fi
          echo "${ZIG_DIR}" >> "$GITHUB_PATH"
          # cargo-zigbuild: use cargo install, reuse from cache after first install.
          cargo install --locked cargo-zigbuild --version ^0.19
        shell: bash

      - name: Build CLI (static musl via zigbuild)
        id: bundle_cli
        run: |
          script/bundle --channel "$CHANNEL" --arch x86_64 --artifact cli --packages none \
            --target x86_64-unknown-linux-musl
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ needs.prepare_metadata.outputs.release_tag }}
          APPIMAGE_EXTRACT_AND_RUN: 1
          # Let script/linux/bundle switch `cargo build` to `cargo zigbuild`.
          USE_ZIGBUILD: "true"
          # libc (musl) is statically linked into the binary with +crt-static — this is key to freeing artifacts
          # from host glibc dependency. `libdbus-sys` now embeds from source via keyring's
          # `vendored` feature (see Cargo.toml), no longer uses pkg-config
          # to detect host `dbus-1`; `PKG_CONFIG_ALLOW_CROSS=1` is kept as fallback,
          # in case a newly introduced -sys crate still uses pkg-config.
          PKG_CONFIG_ALLOW_CROSS: 1

      - name: Package CLI tarball
        run: |
          cp "${{ steps.bundle_cli.outputs.executable_path }}" zap-oss
          tar czf zap-linux-x86_64.tar.gz \
            zap-oss \
            -C "$(dirname "${{ steps.bundle_cli.outputs.bundled_resources_dir }}")" resources
        shell: bash

      - name: Upload CLI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zap-cli-linux-x86_64
          path: zap-linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    # Must wait for all platforms to build successfully before publishing; if any fails → this job is skipped → no empty Release.
    needs:
      - prepare_metadata
      - release_macos
      - release_windows
      - release_linux
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          merge-multiple: true

      # release-body artifact is for GitHub Release description, not an artifact to attach to Release assets.
      # Move it early from dist/ to separate path, avoid `files: dist/*` treating it as asset upload.
      - name: Extract release body from artifacts
        shell: bash
        run: |
          mv dist/release-body.md ./release-body.md
          echo "---- release-body.md ----"
          cat ./release-body.md

      - name: List downloaded files
        run: ls -lh dist
        shell: bash

      - name: Create GitHub release with all assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: ${{ needs.prepare_metadata.outputs.release_name }}
          tag_name: ${{ needs.prepare_metadata.outputs.release_tag }}
          body_path: ./release-body.md
          draft: false
          prerelease: false
          make_latest: "true"
          files: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}

      # Delete this run's workflow artifacts immediately after successful release to free up Actions storage quota.
      # Installers are already attached to GitHub Release (independent storage, doesn't consume Actions storage),
      # workflow artifacts are just an intermediary pipeline from build job → publish job, no point keeping them.
      # Only execute after Release creation succeeds (if: success()), keep artifacts on failure for review.
      - name: Delete workflow artifacts to free Actions storage
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ids=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --jq '.artifacts[].id')
          for id in $ids; do
            echo "Deleting artifact $id"
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
          done
        shell: bash
